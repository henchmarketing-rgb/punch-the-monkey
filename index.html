<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PUNCH-KUN 🐒</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 100%;
      background: #000;
    }
    body {
      /* position:fixed locks the body to the true visible viewport on iOS Safari —
         prevents the canvas from drifting below the fold */
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
      /* keep canvas within the fixed viewport */
      max-width: 100%;
      max-height: 100%;
    }
  </style>
  <style>
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-family: monospace;
      text-align: center;
      gap: 20px;
    }
    #rotate-prompt .icon {
      font-size: 64px;
      animation: spin90 1.2s ease-in-out infinite alternate;
    }
    #rotate-prompt p {
      font-size: 16px;
      color: #8acc44;
      letter-spacing: 0.05em;
    }
    @keyframes spin90 {
      from { transform: rotate(0deg); }
      to   { transform: rotate(90deg); }
    }
    /* Show only on portrait mobile */
    @media screen and (max-width: 900px) and (orientation: portrait) {
      #rotate-prompt { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <div class="icon">📱</div>
    <p>ROTATE YOUR DEVICE</p>
    <p style="font-size:12px;color:#555;">This game is best played in landscape</p>
  </div>
  <script type="module" src="/src/main.js"></script>
  <script>
    // Try to lock orientation to landscape on supporting browsers
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {/* not supported — overlay handles it */})
    }
  </script>
</body>
</html>
